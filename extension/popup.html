<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UHDD Quality Picker</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="logo">
      <img src="icons/icon48.png" alt="UHDD Logo" width="24" height="24">
      <span>UHDD Picker</span>
    </div>
  </div>

  <div class="container">
    <!-- State 1: Loading -->
    <div id="loading-state" class="state">
      <div class="spinner"></div>
      <p class="status-text">Sniffing formats…</p>
    </div>

    <!-- State 2: Error / No Media -->
    <div id="error-state" class="state hidden">
      <div class="error-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
      </div>
      <p id="error-message" class="status-text">No downloadable media detected.</p>
    </div>

    <!-- State 3: Loaded / Quality Options -->
    <div id="loaded-state" class="state hidden">
      <div id="media-title" class="media-title"></div>
      <h3 class="section-title">Choose Quality</h3>
      <div id="quality-options" class="format-list"></div>
    </div>

    <!-- State 4: Success -->
    <div id="success-state" class="state hidden">
      <div class="success-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
        </svg>
      </div>
      <p class="status-text">Download Queued!</p>
      <p id="success-message" class="sub-text">Dispatch successful.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
